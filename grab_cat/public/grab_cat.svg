<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>GrabCat Favicon</title>

  <!-- Outer badge ring -->
  <circle cx="32" cy="32" r="31" fill="rgb(99,153,34)"/>
  <circle cx="32" cy="32" r="27" fill="rgb(23,52,4)"/>
  <circle cx="32" cy="32" r="24" fill="rgb(59,109,17)"/>
  <circle cx="32" cy="32" r="20" fill="rgb(23,52,4)"/>

  <!-- Pointy ears -->
  <polygon points="20,26 26,10 33,24" fill="rgb(192,221,151)"/>
  <polygon points="31,24 38,10 44,26" fill="rgb(192,221,151)"/>
  <!-- Inner ear -->
  <polygon points="22,24 26,14 31,23" fill="#3B6D11"/>
  <polygon points="33,23 38,14 42,24" fill="#3B6D11"/>

  <!-- Cat head -->
  <circle cx="32" cy="35" r="16" fill="rgb(192,221,151)"/>

  <!-- Face dark circle -->
  <circle cx="32" cy="37" r="9" fill="rgb(23,52,4)"/>

  <!-- Eyes -->
  <ellipse cx="27" cy="33" rx="3.5" ry="4" fill="rgb(192,221,151)"/>
  <ellipse cx="37" cy="33" rx="3.5" ry="4" fill="rgb(192,221,151)"/>

  <!-- Eye shine -->
  <circle cx="28.5" cy="32" r="1.2" fill="#EAF3DE"/>
  <circle cx="38.5" cy="32" r="1.2" fill="#EAF3DE"/>

  <!-- Nose -->
  <polygon points="32,40 29.5,43 34.5,43" fill="rgb(250,199,117)"/>

  <!-- Mouth -->
  <path d="M29,43.5 Q32,46 35,43.5" fill="none" stroke="#3B6D11" stroke-width="1" stroke-linecap="round"/>

  <!-- Whiskers -->
  <line x1="15" y1="38" x2="26" y2="40" stroke="#3B6D11" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="15" y1="41" x2="26" y2="41.5" stroke="#3B6D11" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="38" y1="40" x2="49" y2="38" stroke="#3B6D11" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="38" y1="41.5" x2="49" y2="41" stroke="#3B6D11" stroke-width="0.8" stroke-linecap="round"/>

  <!-- Paw at bottom -->
  <circle cx="32" cy="55" r="5" fill="rgb(192,221,151)"/>
  <circle cx="26" cy="52" r="3" fill="rgb(192,221,151)"/>
  <circle cx="38" cy="52" r="3" fill="rgb(192,221,151)"/>
  <circle cx="29" cy="50" r="2.5" fill="rgb(192,221,151)"/>
  <circle cx="35" cy="50" r="2.5" fill="rgb(192,221,151)"/>

  <!-- Diamond separators -->
  <rect x="5" y="29.5" width="5" height="5" rx="0.5" transform="rotate(45 7.5 32)" fill="rgb(250,199,117)"/>
  <rect x="54" y="29.5" width="5" height="5" rx="0.5" transform="rotate(45 56.5 32)" fill="rgb(250,199,117)"/>
</svg>
