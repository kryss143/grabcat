<svg width="300" height="300" viewBox="0 0 300 300" role="img" xmlns="http://www.w3.org/2000/svg"><title>GrabCat Logo v3 Green Pointy Ears</title><desc>A retro badge-style GrabCat logo in green with pointy cat ears and circular emblem</desc><!-- Badge rings --><circle cx="150" cy="150" r="110" style="fill:rgb(99,153,34);stroke:none;stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1"/><circle cx="150" cy="150" r="100" style="fill:rgb(23,52,4);stroke:none;stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1"/><circle cx="150" cy="150" r="95" style="fill:rgb(59,109,17);stroke:none;stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1"/><circle cx="150" cy="150" r="85" style="fill:rgb(23,52,4);stroke:none;stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1"/><!-- Pointy ears: triangles with slightly rounded tips --><polygon points="108,128 122,72 148,118" style="fill:rgb(192,221,151);stroke:none;stroke-width:1px;opacity:1"/><polygon points="152,118 178,72 192,128" style="fill:rgb(192,221,151);stroke:none;stroke-width:1px;opacity:1"/><!-- Inner ear accent --><polygon points="114,124 124,88 142,118" fill="#3B6D11" style="stroke:none;opacity:1"/><polygon points="158,118 176,88 186,124" fill="#3B6D11" style="stroke:none;opacity:1"/><!-- Cat head --><circle cx="150" cy="155" r="52" style="fill:rgb(192,221,151);stroke:none;opacity:1"/><!-- Face highlight --><circle cx="150" cy="160" r="32" style="fill:rgb(23,52,4);stroke:none;opacity:1"/><!-- Eyes --><ellipse cx="138" cy="152" rx="8" ry="9" style="fill:rgb(192,221,151);stroke:none;opacity:1"/><ellipse cx="162" cy="152" rx="8" ry="9" style="fill:rgb(192,221,151);stroke:none;opacity:1"/><!-- Eye shine --><circle cx="141" cy="149" r="2.5" fill="#EAF3DE" style="stroke:none;opacity:1"/><circle cx="165" cy="149" r="2.5" fill="#EAF3DE" style="stroke:none;opacity:1"/><!-- Nose --><polygon points="150,166 145,172 155,172" style="fill:rgb(250,199,117);stroke:none;opacity:1"/><!-- Mouth --><path d="M145,173 Q150,179 155,173" fill="none" stroke="#3B6D11" stroke-width="1.5" stroke-linecap="round" style="opacity:1"/><!-- Whiskers --><line x1="118" y1="167" x2="140" y2="170" stroke="#3B6D11" stroke-width="1" stroke-linecap="round" style="opacity:1"/><line x1="116" y1="173" x2="140" y2="173" stroke="#3B6D11" stroke-width="1" stroke-linecap="round" style="opacity:1"/><line x1="160" y1="170" x2="182" y2="167" stroke="#3B6D11" stroke-width="1" stroke-linecap="round" style="opacity:1"/><line x1="160" y1="173" x2="184" y2="173" stroke="#3B6D11" stroke-width="1" stroke-linecap="round" style="opacity:1"/><!-- Paw at bottom of badge --><circle cx="150" cy="224" r="14" style="fill:rgb(192,221,151);stroke:none;opacity:1"/><circle cx="133" cy="216" r="8" style="fill:rgb(192,221,151);stroke:none;opacity:1"/><circle cx="167" cy="216" r="8" style="fill:rgb(192,221,151);stroke:none;opacity:1"/><circle cx="143" cy="210" r="7" style="fill:rgb(192,221,151);stroke:none;opacity:1"/><circle cx="157" cy="210" r="7" style="fill:rgb(192,221,151);stroke:none;opacity:1"/><!-- Badge ring text --><text x="150" y="68" font-family="system-ui,sans-serif" font-size="11" font-weight="700" text-anchor="middle" letter-spacing="7" style="fill:rgb(192,221,151);stroke:none;opacity:1">GRABCAT</text><text x="150" y="244" font-family="system-ui,sans-serif" font-size="10" font-weight="700" text-anchor="middle" letter-spacing="5" style="fill:rgb(192,221,151);stroke:none;opacity:1">EST. 2025</text><!-- Diamond separators --><rect x="63" y="147" width="7" height="7" rx="1" transform="rotate(45 66 150)" style="fill:rgb(250,199,117);stroke:none;opacity:1"/><rect x="224" y="147" width="7" height="7" rx="1" transform="rotate(45 227 150)" style="fill:rgb(250,199,117);stroke:none;opacity:1"/></svg>